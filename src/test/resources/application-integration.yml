spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

hyw:
  sql:
    monitor:
      enabled: true
      slow-threshold: 50
      critical-threshold: 200
      log-enabled: true
      sample-rate: 1.0
      max-sql-length: 2000
      sensitive:
        enabled: true
        sensitive-fields:
          - password
          - phone
        sensitive-tables:
          - t_user
      metrics:
        enabled: true
      mdc:
        enabled: true
